<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cookie Clicker Empire</title>
    <meta name="description" content="A high-performance, real-time cookie clicker game built with Vite, TypeScript, and Appwrite." />
    <!-- Tailwind CSS via CDN for rapid development and production-ready utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Ensure the app container fills the viewport */
      #app {
        min-height: 100vh;
        width: 100%;
      }
    </style>
  </head>
  <body class="bg-[#1c1917] text-[#fafaf9] font-sans">
    
    <!-- Main Application Entry Point -->
    <div id="app">
      <!-- Components will be injected here by src/main.ts -->
      <div class="flex items-center justify-center min-h-screen">
        <div class="animate-pulse text-center">
          <h1 class="text-2xl font-bold text-[#f59e0b]">Loading Cookie Empire...</h1>
        </div>
      </div>
    </div>

    <!-- Main Application Script -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
